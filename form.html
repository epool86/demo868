<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 500px; margin: 2rem auto; padding: 0 1rem; color: #333; }
  h1 { text-align: center; color: #111; margin-bottom: 1.5rem; }
  form { display: flex; flex-direction: column; gap: 1rem; }
  input, textarea { width: 100%; padding: 0.8rem; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
  input:focus, textarea:focus { border-color: #0066cc; outline: none; }
  button { padding: 1rem; background: #0066cc; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 600; }
  button:hover { background: #0052a3; }
  #msg { text-align: center; color: #2e7d32; font-weight: 600; margin-top: 1rem; min-height: 1.5rem; }
</style>
</head>
<body>
  <h1>Contact us</h1>
  <form id="contactForm">
    <input type="text" id="name" name="name" placeholder="Your Name" required>
    <input type="email" id="email" name="email" placeholder="Your Email" required>
    <textarea id="message" name="message" placeholder="Your Message" rows="5" required></textarea>
    <button type="submit">Send</button>
  </form>
  <p id="msg"></p>

  <script>
    const form = document.getElementById('contactForm');
    const msg = document.getElementById('msg');
    const URL = 'https://script.google.com/macros/s/AKfycbxPldAv0ONw_RdJP6XZdjq83DCLY8XQubxL_pda0h5ShUG3PukxEhLaUPBa7cbYLYFV/exec';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = "Sending...";
      msg.style.color = "#333";
      
      const data = { 
        name: form.name.value, 
        email: form.email.value, 
        message: form.message.value 
      };

      try {
        await fetch(URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(data)
        });
        
        msg.textContent = "Thanks! We'll get back to you.";
        msg.style.color = "#2e7d32";
        form.reset();
      } catch (err) {
        msg.textContent = "Error sending message.";
        msg.style.color = "red";
      }
    });
  </script>
</body>
</html>
